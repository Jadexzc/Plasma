name: kubernetes-config-exposed
description: Exposed Kubernetes configuration or secret manifest reveals cluster credentials or service configuration
severity: critical
tags: [exposure, kubernetes, k8s, config]
owasp_id: A05:2021
cwe_id: CWE-200
remediation: Never store Kubernetes manifests or kubeconfig files in the webroot. Use secrets management solutions.

request:
  method: GET
  paths:
    - /kubeconfig
    - /.kube/config
    - /kubernetes.yml
    - /k8s-secret.yaml
    - /deployment.yaml

match:
  status: [200]
  condition: or
  words:
    - "apiVersion:"
    - "kind: Secret"
    - "kind: Deployment"
    - "cluster-admin"
    - "server: https"
  not_words:
    - "<html"
