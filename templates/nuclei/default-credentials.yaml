name: default-credentials-check
description: Common admin interfaces may be using default credentials (admin/admin, admin/password)
severity: critical
tags: [default-creds, authentication, admin]
owasp_id: A07:2021
cwe_id: CWE-1392
remediation: Change all default credentials immediately. Enforce strong password policies. Enable MFA for all admin accounts.

request:
  method: POST
  paths:
    - /admin/login
    - /administrator/index.php
    - /wp-login.php
  headers:
    Content-Type: application/x-www-form-urlencoded
  body: "username=admin&password=admin"

match:
  status: [200, 302]
  condition: or
  words:
    - "Dashboard"
    - "Welcome"
    - "Logout"
    - "wp-admin"
  not_words:
    - "Invalid password"
    - "Login failed"
    - "incorrect"
