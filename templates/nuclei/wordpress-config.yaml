name: wordpress-config-leak
description: Detect exposed wp-config.php containing database credentials
severity: critical
tags: [wordpress, config, credentials]
owasp_id: A05:2021
cwe_id: CWE-538

request:
  method: GET
  path: /wp-config.php

match:
  status: [200]
  words:
    - DB_PASSWORD
    - DB_NAME

remediation: Remove or restrict web server access to wp-config.php
