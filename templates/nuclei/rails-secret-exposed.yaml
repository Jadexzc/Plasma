name: rails-secret-key-exposed
description: Ruby on Rails secret_key_base or credentials file is publicly accessible, enabling cookie forgery and RCE
severity: critical
tags: [rails, ruby, credentials, secret-key, exposure]
owasp_id: A05:2021
cwe_id: CWE-200
remediation: |
  Never commit config/secrets.yml with real values.
  Use Rails encrypted credentials (config/credentials.yml.enc) with master.key
  secured outside the webroot. Block web server access to config/ directory.

request:
  method: GET
  paths:
    - /config/secrets.yml
    - /config/database.yml
    - /config/application.yml
    - /config/credentials.yml

match:
  status: [200]
  condition: or
  words:
    - "secret_key_base:"
    - "secret_token:"
    - "password:"
    - "username:"
    - "database:"
  not_words:
    - "<html"
    - "404"
    - "# Secret"
